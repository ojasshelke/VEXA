services:
  # ─── VEXA Backend (FastAPI) ──────────────────────────────────────
  - type: web
    name: vexa-api-service
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false

  # ─── VEXA Frontend (Next.js) ─────────────────────────────────────
  - type: web
    name: vexa-main-frontend
    env: node
    plan: free
    buildCommand: "cd frontend && npm install --legacy-peer-deps && npm run build"
    startCommand: "cd frontend && npm run start"
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AVATAR_SERVICE_URL
        fromService:
          name: vexa-api-service
          type: web
          property: host
      - key: PYTHON_SERVICE_URL
        fromService:
          name: vexa-api-service
          type: web
          property: host
      - key: LIGHTX_API_KEY
        sync: false
      - key: TRYON_PROVIDER
        value: "lightx"
      - key: INTERNAL_SERVICE_TOKEN
        sync: false


