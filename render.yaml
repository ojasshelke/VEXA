services:
  # ─── VEXA Backend (FastAPI) ──────────────────────────────────────
  - type: web
    name: vexa-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: INTERNAL_SERVICE_TOKEN
        sync: false # Set this in the Render Dashboard
      - key: NEXT_PUBLIC_APP_URL
        sync: false # Point this to your frontend URL

  # ─── VEXA Frontend (Next.js) ─────────────────────────────────────
  - type: web
    name: vexa-frontend
    env: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm run start"
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AVATAR_SERVICE_URL
        fromService:
          name: vexa-backend
          type: web
          property: host
      - key: PYTHON_SERVICE_URL
        fromService:
          name: vexa-backend
          type: web
          property: host
      - key: LIGHTX_API_KEY
        sync: false
      - key: TRYON_PROVIDER
        value: "lightx"
